<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory of Neural and Somatic Computing (LNSC) | Georgia Southern University</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="global.css">

    <script src="components/load-nav-footer.js" type="module" defer></script>
</head>

<body class="bg-gray-50 text-gray-800 antialiased selection:bg-gsuGold selection:text-gsuNavy">

    <div class="w-screen min-h-screen">
        <div id="nav-insert"></div>
        <section id="people" class="pt-10 pb-20 bg-gray-50">
            <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gsuNavy uppercase tracking-wide">Our People</h2>
                    <div class="h-1 w-20 bg-gsuGold mx-auto mt-4 rounded"></div>
                </div>
                <div class="space-y-12" id="peopleCont">
                    <!-- There is JavaScript that puts code here. Do not remove this <div> -->
                </div>
            </div>
        </section>
    </div>

    <div id="footer-insert"></div>

    <script>
        const people = [
            {
                role: "Principal Investigator",
                name: "Dr. Meenalosini Vimal Cruz",
                title: "Associate Professor",
                imageUrl: "images/people/meena.jpg",
                links: [
                    { icon: '<i class="fa-brands fa-github"></i>', role: "GitHub", link: "" },
                    { icon: '<i class="fa-brands fa-linkedin"></i>', role: "LinkedIn", link: "" },
                    { icon: '<i class="fa-solid fa-graduation-cap"></i>', role: "Google Scholar", link: "" },
                ],
                description: "Dr. Cruz directs the Laboratory of Neural and Somatic Computing (LNSC), focusing on translational AI in medicine. Her research explores interpretable deep learning architectures, multimodal emotion recognition, and equitable clinical decision support systems.\n\nShe leads multiple high-impact projects bridging neurodevelopmental informatics with integrative oncology, prioritizing frameworks that offer real-world transparency and trust for clinical practitioners."
            },
            {
                role: "Co-Principal Investigator",
                name: "Akshay Bhuvaneswari Ramakrishnan",
                title: "Presidential Research Fellow",
                imageUrl: "images/people/akshay.jpg",
                links: [
                    { icon: '<i class="fa-brands fa-github"></i>', role: "GitHub", link: "" },
                    { icon: '<i class="fa-brands fa-linkedin"></i>', role: "LinkedIn", link: "" },
                    { icon: '<i class="fa-solid fa-graduation-cap"></i>', role: "Google Scholar", link: "" },
                ],
                description: "Akshay specializes in machine learning, data engineering, and medical artificial intelligence applications. He focuses on the architectural design of complex deep learning systems, including the integration of classical signal processing with self-supervised learning.\n\nHis recent work drives the technical development of ocular disease recognition frameworks, advanced survival modeling in integrative oncology, and the optimization of training pipelines for deployment in resource-limited clinical environments."
            }
        ]

        const peopleCont = document.querySelector("#peopleCont");
        for (const person of people) {

            let links = "";
            for (const link of person.links) {
                links += `<a href="${link.link}" title="${link.role}" class="text-gray-400 hover:text-gsuNavy transition">${link.icon}</a>`;
            }

            peopleCont.innerHTML += `
<div class="bg-white rounded-xl shadow-lg border-l-4 border-gsuNavy p-8">
    <h3 class="text-2xl font-bold text-gsuNavy mb-6 border-b border-gray-100 pb-4 uppercase tracking-wide">
        ${person.role}
    </h3>
    <div class="flex flex-col md:flex-row gap-8 items-start">
        <div class="w-full md:w-1/3 flex flex-col items-center text-center">
            <div class="w-48 h-auto overflow-hidden mb-4 shadow-inner bg-gray-200">
                <img src="${person.imageUrl}" alt="${person.name}" class="w-full h-full object-cover">
            </div>
            <h4 class="text-xl font-bold text-gray-900">${person.name}</h4>
            <p class="text-gsuGold font-semibold text-sm mb-3">${person.title}</p>
            <div class="flex space-x-3 mt-2">
                ${links}
            </div>
        </div>
        <div class="md:w-2/3 text-gray-700 leading-relaxed">
            <p class="mb-4">
                ${person.description.replaceAll("\n", "<br>")}
            </p>
        </div>
    </div>
</div>
`;
        }
    </script>

</body>

</html>
