<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somatic Artificial Intelligence Laboratory (SAIL) | Georgia Southern University</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="global.css">

    <script src="components/load-nav-footer.js" type="module" defer></script>
</head>

<body class="bg-gray-50 text-gray-800 antialiased selection:bg-gsuGold selection:text-gsuNavy">

    <div class="w-screen min-h-screen">
        <div id="nav-insert"></div>
        <section id="people" class="pt-10 pb-20 bg-gray-100">
            <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gsuNavy uppercase tracking-wide">Investigators</h2>
                    <div class="h-1 w-20 bg-gsuGold mx-auto mt-4 rounded"></div>
                </div>
                <div class="space-y-12" id="investigators-cont">
                    <!-- There is JavaScript that puts code here. Do not remove this <div> -->
                </div>
            </div>
            <div class="mt-20 mx-20">
                <h3 class="text-2xl font-bold text-gsuNavy mb-8 border-b-2 border-gray-200 pb-2" id="graduates-title">Graduate Students</h3>

                <div class="w-full flex justify-center">
                    <div class="max-w-7xl flex flex-wrap gap-[20px]" id="graduates-cont">
                        <!-- There is JavaScript that puts code here. Do not remove this <div> -->
                    </div>
                </div>
            </div>
            <div class="mt-20 mx-20">
                <h3 class="text-2xl font-bold text-gsuNavy mb-8 border-b-2 border-gray-200 pb-2">Undergraduate Students</h3>

                <div class="w-full flex justify-center">
                    <div class="max-w-7xl flex flex-wrap gap-[20px]" id="undergraduates-cont">
                        <!-- There is JavaScript that puts code here. Do not remove this <div> -->
                    </div>
                </div>
            </div>
            <div class="mt-20 mx-20">
                <h3 class="text-2xl font-bold text-gsuNavy mb-8 border-b-2 border-gray-200 pb-2">Former Students</h3>

                <div class="w-full flex justify-center">
                    <div class="max-w-7xl flex flex-wrap gap-[20px]" id="formers-cont">
                        <!-- There is JavaScript that puts code here. Do not remove this <div> -->
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="footer-insert"></div>

    <script>
        const MERGE_GRAD_AND_UNDERGRAD_SECTIONS = true;

        const people = [
            {
                type: "investigator",
                role: "Principal Investigator",
                name: "Dr. Meenalosini Vimal Cruz",
                title: "Associate Professor",
                imageUrl: "images/people/meenalosini-v-cruz.jpg",
                links: [
                    { icon: '<i class="fa-brands fa-github"></i>', role: "GitHub", link: "https://github.com/meenalosinivimalcruz" },
                    { icon: '<i class="fa-brands fa-linkedin"></i>', role: "LinkedIn", link: "https://www.linkedin.com/in/meena-vimal-cruz" },
                    { icon: '<i class="fa-solid fa-graduation-cap"></i>', role: "Google Scholar", link: "https://scholar.google.com/citations?user=QmiqNjcAAAAJ&hl=en" },
                ],
                description: "Dr. Cruz directs the Somatic Artificial Intelligence Laboratory (SAIL), focusing on translational AI in medicine. Her research explores interpretable deep learning architectures, multimodal emotion recognition, and equitable clinical decision support systems.\n\nShe leads multiple high-impact projects bridging neurodevelopmental informatics with integrative oncology, prioritizing frameworks that offer real-world transparency and trust for clinical practitioners."
            },
            {
                type: "investigator",
                role: "Co-Principal Investigator",
                name: "Akshay Bhuvaneswari Ramakrishnan",
                title: "Presidential Research Fellow",
                imageUrl: "images/people/akshay-b-rama.jpg",
                links: [
                    { icon: '<i class="fa-brands fa-github"></i>', role: "GitHub", link: "https://github.com/AkshayBRamki" },
                    { icon: '<i class="fa-brands fa-linkedin"></i>', role: "LinkedIn", link: "https://www.linkedin.com/in/akshay-bhuvaneswari-ramakrishnan-0a9286199/" },
                    { icon: '<i class="fa-solid fa-graduation-cap"></i>', role: "Google Scholar", link: "https://scholar.google.com/citations?user=EUVHa0sAAAAJ&hl=en" },
                ],
                description: "Akshay specializes in machine learning, data engineering, and medical artificial intelligence applications. He focuses on the architectural design of complex deep learning systems, including the integration of classical signal processing with self-supervised learning.\n\nHis recent work drives the technical development of ocular disease recognition frameworks, advanced survival modeling in integrative oncology, and the optimization of training pipelines for deployment in resource-limited clinical environments."
            },
            {
                type: "graduate",
                name: "Nitish Kumar",
                imageUrl: "images/people/nitish-kuma.png",
                description: "Lorem, ipsum dolor sit amet consectetur adipisicing elit. Tenetur unde mollitia molestiae in impedit temporibus ab laudantium corporis maxime est nihil dolor fuga optio possimus, rem, cum velit at sequi?"
            },
            // {
            //     type: "undergraduate",
            //     name: "Temporary Card",
            //     imageUrl: "images/people/placeholder.png",
            //     description: "Lorem, ipsum dolor sit amet consectetur adipisicing elit. Tenetur unde mollitia molestiae in impedit temporibus ab laudantium corporis maxime est nihil dolor fuga optio possimus, rem, cum velit at sequi?"
            // },
            // {
            //     type: "former",
            //     name: "Temporary Card",
            // },
        ];

        const investigatorsCont = document.querySelector("#investigators-cont");
        const gradsCont = document.querySelector("#graduates-cont");
        const undergradsCont = document.querySelector("#undergraduates-cont");
        const formersCont = document.querySelector("#formers-cont");

        const formers = people.filter((p) => p.type == "former");
        if (formers.length == 0) formersCont.parentElement.parentElement.remove();

        // NOTE: The "Graduates" section becomes the "Research Associates" section when MERGE_GRAD_AND_UNDERGRAD_SECTIONS is true
        if (MERGE_GRAD_AND_UNDERGRAD_SECTIONS) {
            undergradsCont.parentElement.parentElement.remove();
            document.querySelector("#graduates-title").innerText = "Research Associates";
        } else {
            const graduates = people.filter((p) => p.type == "graduate");
            const ungraduates = people.filter((p) => p.type == "undergraduate");

            if (graduates.length == 0) gradsCont.parentElement.parentElement.remove();
            if (ungraduates.length == 0) undergradsCont.parentElement.parentElement.remove();
        }

        for (const person of people) {

            let links = "";

            if (person.type == "investigator" && person.links != null && person.links.length > 0) {
                for (const link of person.links) {
                    links += `<a href="${link.link}" title="${link.role}" target="_blank" class="text-gray-400 hover:text-gsuNavy transition">${link.icon}</a>`;
                }
            }

            switch (person.type) {
                case "investigator":
                    investigatorsCont.innerHTML += `
<div class="bg-white rounded-xl shadow-lg border-l-4 border-gsuNavy p-8">
    <h3 class="text-2xl font-bold text-gsuNavy mb-6 border-b border-gray-100 pb-4 uppercase tracking-wide">
        ${person.role}
    </h3>
    <div class="flex flex-col md:flex-row gap-8 items-start">
        <div class="w-full md:w-1/3 flex flex-col items-center text-center">
            <div class="w-48 h-auto overflow-hidden mb-4 shadow-inner bg-gray-200">
                <img src="${person.imageUrl}" alt="${person.name}" class="w-full h-full object-cover">
            </div>
            <h4 class="text-xl font-bold text-gray-900">${person.name}</h4>
            <p class="text-gsuGold font-semibold text-sm mb-3">${person.title}</p>
            <div class="flex space-x-3 mt-2">
                ${links}
            </div>
        </div>
        <div class="md:w-2/3 text-gray-700 leading-relaxed">
            <p class="mb-4">
                ${person.description.replaceAll("\n", "<br>")}
            </p>
        </div>
    </div>
</div>
`;
                    break;
                case "graduate":
                case "undergraduate":
                    const code = `
<div class="group w-[275px] h-[300px] bg-white rounded-xl shadow-md hover:shadow-lg transition-all">
    <div class="relative w-full h-[225px] flex justify-center items-center">
        <img src="${person.imageUrl}" alt="${person.name}" class="h-4/5 rounded-full">
        <div class="absolute inset-0 bg-gsuNavy/95 opacity-0 group-hover:opacity-100 transition-opacity duration-300 p-6 flex items-center justify-center text-center rounded-t-xl">
            <p class="text-white text-sm">${person.description || "A wonderful student researcher working on the next great thing at SAIL."}</p>
        </div>
    </div>
    <div class="w-full h-[75px] flex flex-col items-center justify-center border-gsuNavy border-t-2">
        <p class="font-bold text-black text-xl text-center">${person.name}</p>
    </div >
</div >                    
`;
                    if (person.type == "graduate" || MERGE_GRAD_AND_UNDERGRAD_SECTIONS) gradsCont.innerHTML += code;
                    else if (person.type == "undergraduate") undergradsCont.innerHTML += code;
                    break;
                case "former":
                    formersCont.innerHTML += `
<div class="bg-white min-w-[250px] px-6 py-4 rounded-xl text-center">
    <p class="font-bold">${person.name}</p>
</div>                    
`;
            }
        }
    </script>

</body>

</html>
